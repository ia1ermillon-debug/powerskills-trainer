<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PowerSkills AI Trainer — Acceso</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  /* ── Variables ─────────────────────────────── */
  :root {
    --bg:       #07080f;
    --surface:  #0d0f1c;
    --border:   rgba(255,255,255,0.07);
    --green:    #00FFB2;
    --purple:   #7B61FF;
    --yellow:   #FFD93D;
    --text:     rgba(255,255,255,0.85);
    --muted:    rgba(255,255,255,0.35);
    --radius:   16px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* ── Background grid + blobs ────────────────── */
  .bg-grid {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      linear-gradient(rgba(0,255,178,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,178,0.025) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .blob {
    position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0;
    animation: drift 12s ease-in-out infinite alternate;
  }
  .blob-1 { width: 400px; height: 400px; background: rgba(0,255,178,0.06); top: -100px; left: -100px; }
  .blob-2 { width: 300px; height: 300px; background: rgba(123,97,255,0.07); bottom: -80px; right: -80px; animation-delay: -6s; }
  .blob-3 { width: 200px; height: 200px; background: rgba(255,217,61,0.05); top: 50%; right: 20%; animation-delay: -3s; }

  @keyframes drift {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(30px, 20px) scale(1.1); }
  }

  /* ── Card ───────────────────────────────────── */
  .card {
    position: relative; z-index: 10;
    width: 100%; max-width: 440px;
    margin: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 32px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(0,255,178,0.04);
    animation: rise 0.7s cubic-bezier(0.16,1,0.3,1) both;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(24px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ── Header ─────────────────────────────────── */
  .card-header {
    padding: 32px 32px 24px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(135deg, rgba(0,255,178,0.04), transparent);
    text-align: center;
  }
  .logo-mark {
    display: inline-flex; align-items: center; justify-content: center;
    width: 56px; height: 56px; border-radius: 16px;
    background: rgba(0,255,178,0.1);
    border: 1px solid rgba(0,255,178,0.2);
    font-family: 'Space Mono', monospace;
    font-size: 18px; font-weight: 700;
    color: var(--green);
    margin-bottom: 16px;
    box-shadow: 0 0 32px rgba(0,255,178,0.15);
  }
  .card-title {
    font-size: 22px; font-weight: 800;
    letter-spacing: -0.03em;
    color: #fff;
    margin-bottom: 4px;
  }
  .card-sub {
    font-size: 13px; color: var(--muted);
    letter-spacing: 0.04em; text-transform: uppercase;
  }

  /* ── Tabs ───────────────────────────────────── */
  .tabs {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 0; padding: 20px 24px 0;
  }
  .tab {
    padding: 10px 0; text-align: center;
    font-size: 13px; font-weight: 600;
    color: var(--muted); cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s ease;
    letter-spacing: 0.02em;
  }
  .tab.active {
    color: var(--green);
    border-bottom-color: var(--green);
  }
  .tab:hover:not(.active) { color: rgba(255,255,255,0.6); }

  /* ── Body ───────────────────────────────────── */
  .card-body { padding: 28px 32px 32px; }

  /* ── Input ──────────────────────────────────── */
  .field { margin-bottom: 16px; }
  .label {
    display: block; margin-bottom: 8px;
    font-size: 12px; font-weight: 600;
    color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase;
  }
  .input {
    width: 100%; padding: 13px 16px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px;
    outline: none; transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input::placeholder { color: rgba(255,255,255,0.2); }
  .input:focus {
    border-color: rgba(0,255,178,0.4);
    box-shadow: 0 0 0 3px rgba(0,255,178,0.07);
  }

  /* ── Button ─────────────────────────────────── */
  .btn {
    width: 100%; padding: 14px 0;
    border: none; border-radius: 12px; cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px; font-weight: 700;
    letter-spacing: 0.01em;
    transition: all 0.2s ease;
    position: relative; overflow: hidden;
    margin-top: 4px;
  }
  .btn-primary {
    background: linear-gradient(135deg, #00FFB2, #00d994);
    color: #07080f;
    box-shadow: 0 8px 24px rgba(0,255,178,0.25);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 12px 32px rgba(0,255,178,0.35); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled {
    opacity: 0.5; cursor: not-allowed; transform: none;
    box-shadow: none;
  }

  /* ── Status messages ────────────────────────── */
  .msg {
    display: none; padding: 12px 16px; border-radius: 10px;
    font-size: 13px; font-weight: 500; line-height: 1.5;
    margin-top: 16px;
  }
  .msg.show { display: block; animation: fadeIn 0.3s ease; }
  .msg-success { background: rgba(0,255,178,0.08); border: 1px solid rgba(0,255,178,0.2); color: #00FFB2; }
  .msg-error   { background: rgba(255,107,107,0.08); border: 1px solid rgba(255,107,107,0.2); color: #FF6B6B; }
  .msg-pending { background: rgba(255,217,61,0.08); border: 1px solid rgba(255,217,61,0.2); color: #FFD93D; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

  /* ── Loader ─────────────────────────────────── */
  .spinner {
    display: inline-block; width: 16px; height: 16px;
    border: 2px solid rgba(7,8,15,0.3);
    border-top-color: rgba(7,8,15,0.8);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle; margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Footer note ─────────────────────────────── */
  .card-footer {
    padding: 0 32px 24px;
    text-align: center;
    font-size: 12px; color: var(--muted);
    line-height: 1.6;
  }
  .card-footer a { color: rgba(0,255,178,0.6); text-decoration: none; }
  .card-footer a:hover { color: var(--green); }

  /* ── Stats strip ─────────────────────────────── */
  .stats {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 1px; background: var(--border);
    margin: 0 0 0;
    border-top: 1px solid var(--border);
  }
  .stat {
    padding: 14px 0; text-align: center;
    background: var(--surface);
  }
  .stat-val { font-size: 16px; font-weight: 800; color: var(--green); font-family: 'Space Mono', monospace; }
  .stat-key { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }

  /* ── Divider ─────────────────────────────────── */
  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 20px 0;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }
  .divider span { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }

  /* ── Access redirect ─────────────────────────── */
  .redirect-panel {
    text-align: center; padding: 12px 0;
  }
  .redirect-panel .big-icon { font-size: 40px; margin-bottom: 12px; }
  .redirect-panel h3 { font-size: 18px; font-weight: 800; margin-bottom: 6px; color: var(--green); }
  .redirect-panel p { font-size: 13px; color: var(--muted); line-height: 1.6; }
  .redirect-btn {
    display: inline-flex; align-items: center; gap: 8px;
    margin-top: 20px; padding: 12px 28px;
    background: linear-gradient(135deg, #00FFB2, #00d994);
    color: #07080f; font-weight: 700; font-size: 14px;
    border-radius: 10px; text-decoration: none;
    transition: all 0.2s ease;
    cursor: pointer; border: none; font-family: 'DM Sans', sans-serif;
  }
  .redirect-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,255,178,0.3); }

  /* ── Responsive ──────────────────────────────── */
  @media (max-width: 480px) {
    .card { margin: 16px; border-radius: 20px; }
    .card-header, .card-body { padding-left: 24px; padding-right: 24px; }
    .card-footer { padding-left: 24px; padding-right: 24px; }
  }
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="card">

  <!-- Header -->
  <div class="card-header">
    <div class="logo-mark">PS</div>
    <div class="card-title">PowerSkills AI Trainer</div>
    <div class="card-sub">Plataforma de entrenamiento profesional</div>
  </div>

  <!-- Stats strip -->
  <div class="stats">
    <div class="stat">
      <div class="stat-val">6</div>
      <div class="stat-key">Módulos</div>
    </div>
    <div class="stat">
      <div class="stat-val">AI</div>
      <div class="stat-key">Powered</div>
    </div>
    <div class="stat">
      <div class="stat-val">v2</div>
      <div class="stat-key">Versión</div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" id="tab-login" onclick="switchTab('login')">Ingresar</div>
    <div class="tab" id="tab-register" onclick="switchTab('register')">Solicitar acceso</div>
  </div>

  <!-- Body -->
  <div class="card-body">

    <!-- ── LOGIN PANEL ── -->
    <div id="panel-login">
      <div class="field">
        <label class="label" for="login-email">Correo electrónico</label>
        <input class="input" type="email" id="login-email" placeholder="tu@empresa.com" autocomplete="email">
      </div>
      <button class="btn btn-primary" id="btn-login" onclick="handleLogin()">
        Ingresar a la plataforma
      </button>
      <div class="msg" id="msg-login"></div>

      <!-- Redirect panel (oculto hasta acceso aprobado) -->
      <div id="redirect-panel" style="display:none" class="redirect-panel">
        <div class="big-icon">✅</div>
        <h3>Acceso aprobado</h3>
        <p id="welcome-text">Bienvenido a PowerSkills AI Trainer</p>
        <button class="redirect-btn" onclick="openApp()">
          ▶ Abrir plataforma
        </button>
      </div>
    </div>

    <!-- ── REGISTER PANEL ── -->
    <div id="panel-register" style="display:none">
      <div class="field">
        <label class="label" for="reg-nombre">Nombre completo</label>
        <input class="input" type="text" id="reg-nombre" placeholder="Tu nombre" autocomplete="name">
      </div>
      <div class="field">
        <label class="label" for="reg-email">Correo electrónico</label>
        <input class="input" type="email" id="reg-email" placeholder="tu@empresa.com" autocomplete="email">
      </div>
      <div class="divider"><span>Al registrarte aceptas el acceso controlado</span></div>
      <button class="btn btn-primary" id="btn-register" onclick="handleRegister()">
        Solicitar acceso
      </button>
      <div class="msg" id="msg-register"></div>
    </div>

  </div>

  <!-- Footer -->
  <div class="card-footer">
    ¿Problemas de acceso? Escribe a <a href="mailto:ia.1ermillon@gmail.com">ia.1ermillon@gmail.com</a>
  </div>

</div>

<script>
// ============================================================
// CONFIGURACIÓN — Edita estos dos valores
// ============================================================
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxL0Rbrt8aP_3T-TFkoKv0CenUuwf0p6_jgYZReq8w_1ajxVtwqsRID0C_8C-GABOsw/exec";
// Ejemplo: "https://script.google.com/macros/s/AKfy.../exec"

// URL del archivo de tu app (puede ser GitHub Pages, Netlify, etc.)
const APP_URL = "https://ia1ermillon-debug.github.io/powerskills-trainer/powerskills-app.html";
// Cambia esto a la URL real donde está desplegada tu app
// ============================================================

let approvedUser = null;

// ── Tabs ─────────────────────────────────────────────────────
function switchTab(tab) {
  const panels = { login: 'panel-login', register: 'panel-register' };
  const tabs    = { login: 'tab-login',   register: 'tab-register' };
  Object.entries(panels).forEach(([key, id]) => {
    document.getElementById(id).style.display = key === tab ? 'block' : 'none';
  });
  Object.entries(tabs).forEach(([key, id]) => {
    document.getElementById(id).classList.toggle('active', key === tab);
  });
  clearMessages();
}

function clearMessages() {
  ['msg-login','msg-register'].forEach(id => {
    const el = document.getElementById(id);
    el.className = 'msg'; el.innerHTML = '';
  });
}

function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.className = `msg msg-${type} show`;
  el.innerHTML = text;
}

function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  btn.disabled = loading;
  btn.innerHTML = loading
    ? `<span class="spinner"></span>Procesando...`
    : (btnId === 'btn-login' ? 'Ingresar a la plataforma' : 'Solicitar acceso');
}

// ── API call ──────────────────────────────────────────────────
async function apiPost(body) {
  const res = await fetch(SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify(body),
    headers: { 'Content-Type': 'application/json' }
  });
  return res.json();
}

// ── LOGIN ─────────────────────────────────────────────────────
async function handleLogin() {
  const email = document.getElementById('login-email').value.trim();
  if (!email || !email.includes('@')) {
    showMsg('msg-login', '⚠️ Ingresa un correo válido.', 'error');
    return;
  }

  if (SCRIPT_URL === 'TU_GOOGLE_APPS_SCRIPT_URL_AQUI') {
    showMsg('msg-login', '⚙️ <strong>Modo demo:</strong> Configura el SCRIPT_URL en el HTML para conectar con tu base de datos.', 'pending');
    return;
  }

  setLoading('btn-login', true);
  clearMessages();

  try {
    const data = await apiPost({ action: 'login', email });

    if (data.access) {
      approvedUser = { email, nombre: data.nombre || email };
      document.getElementById('btn-login').style.display = 'none';
      document.querySelector('.field').style.display = 'none';
      document.getElementById('welcome-text').textContent =
        `Hola${data.nombre ? ', ' + data.nombre : ''}. Tu acceso está activo.`;
      document.getElementById('redirect-panel').style.display = 'block';
      clearMessages();
    } else {
      const type = data.estado === 'pendiente' ? 'pending' : 'error';
      showMsg('msg-login', `⚠️ ${data.message}`, type);
    }
  } catch (e) {
    showMsg('msg-login', '❌ Error de conexión. Intenta de nuevo.', 'error');
  } finally {
    setLoading('btn-login', false);
  }
}

// ── REGISTER ──────────────────────────────────────────────────
async function handleRegister() {
  const nombre = document.getElementById('reg-nombre').value.trim();
  const email  = document.getElementById('reg-email').value.trim();

  if (!email || !email.includes('@')) {
    showMsg('msg-register', '⚠️ Ingresa un correo válido.', 'error');
    return;
  }

  if (SCRIPT_URL === 'TU_GOOGLE_APPS_SCRIPT_URL_AQUI') {
    showMsg('msg-register', '⚙️ <strong>Modo demo:</strong> Configura el SCRIPT_URL para habilitar registros reales.', 'pending');
    return;
  }

  setLoading('btn-register', true);
  clearMessages();

  try {
    const data = await apiPost({ action: 'register', email, nombre });
    if (data.success) {
      showMsg('msg-register', `✅ ${data.message}`, 'success');
      document.getElementById('reg-nombre').value = '';
      document.getElementById('reg-email').value = '';
    } else {
      showMsg('msg-register', `⚠️ ${data.message}`, 'error');
    }
  } catch (e) {
    showMsg('msg-register', '❌ Error de conexión. Intenta de nuevo.', 'error');
  } finally {
    setLoading('btn-register', false);
  }
}

// ── OPEN APP ──────────────────────────────────────────────────
function openApp() {
  if (approvedUser) {
    sessionStorage.setItem('ps_user', JSON.stringify(approvedUser));
  }
  window.location.href = APP_URL;
}

// ── Enter key support ──────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    const activePanel = document.getElementById('panel-login').style.display !== 'none'
      ? 'login' : 'register';
    if (activePanel === 'login') handleLogin();
    else handleRegister();
  }
});
</script>
</body>
</html>
