function AnimatedNumber({ value, duration = 1200 }) {
  const [display, setDisplay] = useState(0);
  useEffect(() => {
    let start = null;
    const step = (ts) => {
      if (!start) start = ts;
      const progress = Math.min((ts - start) / duration, 1);
      setDisplay(Math.round(progress * value));
      if (progress < 1) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  }, [value, duration]);
  return React.createElement('span', null, display);
}

function RadarChart({ skills }) {
  const cx = 120, cy = 120, r = 80;
  const n = skills.length;
  const points = skills.map((s, i) => {
    const angle = (i / n) * 2 * Math.PI - Math.PI / 2;
    const pct = s.score / 100;
    return { x: cx + r * pct * Math.cos(angle), y: cy + r * pct * Math.sin(angle) };
  });
  const bgPoints = skills.map((_, i) => {
    const angle = (i / n) * 2 * Math.PI - Math.PI / 2;
    return { x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle) };
  });
  const polyPts = points.map((p) => `${p.x},${p.y}`).join(" ");
  const bgPts = bgPoints.map((p) => `${p.x},${p.y}`).join(" ");
  const labels = skills.map((s, i) => {
    const angle = (i / n) * 2 * Math.PI - Math.PI / 2;
    return { x: cx + (r + 20) * Math.cos(angle), y: cy + (r + 20) * Math.sin(angle), label: s.label.slice(0, 5) };
  });
  return (
    <svg viewBox="0 0 240 240" width="200" height="200">
      {[0.25, 0.5, 0.75, 1].map((scale) => (
        <polygon key={scale} points={bgPoints.map((p) => `${cx + (p.x - cx) * scale},${cy + (p.y - cy) * scale}`).join(" ")} fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth="1" />
      ))}
      {bgPoints.map((p, i) => (
        <line key={i} x1={cx} y1={cy} x2={p.x} y2={p.y} stroke="rgba(255,255,255,0.06)" strokeWidth="1" />
      ))}
      <polygon points={polyPts} fill="rgba(0,255,178,0.15)" stroke="#00FFB2" strokeWidth="1.5" />
      {points.map((p, i) => (
        <circle key={i} cx={p.x} cy={p.y} r="3" fill={skills[i].color} />
      ))}
      {labels.map((l, i) => (
        <text key={i} x={l.x} y={l.y} textAnchor="middle" dominantBaseline="middle" fill="rgba(255,255,255,0.5)" fontSize="8">
          {l.label}
        </text>
      ))}
    </svg>
  );
}

function MicWave({ active }) {

  );
}

    const res = await fetch("https://api.anthropic.com/v1/messages", {

      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: "user", content: prompt }],
      }),
    });
    const data = await res.json();
    return data.content?.[0]?.text || "";
  }

    return (
      <div style={S.content}>
        <div style={S.sectionTitle}>AI Interview Simulator</div>
        <div style={S.sectionSub}>Practice with AI-powered recruiter scenarios and get instant feedback</div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"16px", marginBottom:"24px" }}>
          {INTERVIEW_SCENARIOS.map((s) => (
            <div key={s.id} style={{ ...S.card, cursor:"pointer", borderColor: selectedInterview?.id===s.id?"#00FFB2":"rgba(255,255,255,0.07)", transition:"all 0.2s" }}
              onClick={() => { setSelectedInterview(s); setInterviewFeedback(null); setInterviewResponse(""); }}
              onMouseEnter={(e) => e.currentTarget.style.background="rgba(255,255,255,0.05)"}
              onMouseLeave={(e) => e.currentTarget.style.background="rgba(255,255,255,0.03)"}>
              <div style={{ display:"flex", gap:"10px", alignItems:"flex-start" }}>
                <div style={{ fontSize:"18px", marginTop:"2px", flexShrink:0 }}>{s.icon}</div>
                <div style={{ flex:1 }}>
                  <div style={{ display:"flex", gap:"6px", marginBottom:"6px", flexWrap:"wrap" }}>
                    <span style={S.badge(s.type==="Behavioral"?"#7B61FF":s.type==="Corporate"?"#00FFB2":s.type==="Recruiter"?"#FFD93D":"#FF6B6B")}>{s.type}</span>
                    <span style={S.badge(s.difficulty==="Hard"?"#FF6B6B":s.difficulty==="Easy"?"#00FFB2":"#FFD93D")}>{s.difficulty}</span>
                  </div>
                  <div style={{ fontSize:"13px", fontWeight:"500", lineHeight:1.5 }}>{s.title}</div>
                  <div style={{ fontSize:"11px", color:"rgba(255,255,255,0.3)", marginTop:"4px" }}>{s.category}</div>
                </div>
              </div>
            </div>
          ))}
        </div>
        {selectedInterview && (
          <div style={S.glowCard}>
            <div style={{ fontSize:"13px", color:"rgba(255,255,255,0.4)", marginBottom:"8px", textTransform:"uppercase", letterSpacing:"0.08em" }}>Active Scenario</div>
            <div style={{ fontSize:"17px", fontWeight:"600", marginBottom:"16px" }}>"{selectedInterview.title}"</div>
            <textarea style={{ ...S.input, minHeight:"120px", marginBottom:"12px" }} placeholder="Type your response here... Be specific and use real examples." value={interviewResponse} onChange={(e) => setInterviewResponse(e.target.value)} />
            <button style={{ ...S.btn, ...S.btnPrimary, opacity:interviewLoading?0.6:1 }} onClick={analyzeInterview} disabled={interviewLoading}>
              {interviewLoading ? "Analyzing..." : "Get AI Feedback →"}
            </button>
            {interviewFeedback && !interviewFeedback.error && (
              <div style={{ marginTop:"20px", display:"grid", gap:"12px" }}>
                <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:"10px" }}>
                  {[{ label:"Impact", val:interviewFeedback.impact_score, color:"#7B61FF" },{ label:"Confidence", val:interviewFeedback.confidence, color:"#00FFB2" },{ label:"Structure", val:interviewFeedback.structure, color:"#FFD93D" },{ label:"Relevance", val:interviewFeedback.relevance, color:"#4ECDC4" }].map((m,i) => (
                    <div key={i} style={{ ...S.card, padding:"14px", textAlign:"center" }}>
                      <div style={{ fontSize:"22px", fontWeight:"800", color:m.color }}>{m.val}</div>
                      <div style={{ fontSize:"11px", color:"rgba(255,255,255,0.4)", textTransform:"uppercase", letterSpacing:"0.06em" }}>{m.label}</div>
                    </div>
                  ))}
                </div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"12px" }}>
                  <div style={{ ...S.card, padding:"16px" }}>
                    <div style={{ fontSize:"12px", color:"#00FFB2", marginBottom:"8px", fontWeight:"600", textTransform:"uppercase", letterSpacing:"0.06em" }}>✓ Strengths</div>
                    {interviewFeedback.strengths?.map((s,i) => <div key={i} style={{ fontSize:"13px", color:"rgba(255,255,255,0.7)", marginBottom:"4px" }}>• {s}</div>)}
                  </div>
                  <div style={{ ...S.card, padding:"16px" }}>
                    <div style={{ fontSize:"12px", color:"#FFD93D", marginBottom:"8px", fontWeight:"600", textTransform:"uppercase", letterSpacing:"0.06em" }}>↑ Improve</div>
                    {interviewFeedback.improvements?.map((s,i) => <div key={i} style={{ fontSize:"13px", color:"rgba(255,255,255,0.7)", marginBottom:"4px" }}>• {s}</div>)}
                  </div>
                </div>
                <div style={{ ...S.card, padding:"16px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                  <div style={{ fontSize:"13px", color:"rgba(255,255,255,0.6)", fontStyle:"italic", flex:1 }}>"{interviewFeedback.recruiter_note}"</div>
                  <div style={{ fontSize:"28px", fontWeight:"900", color:"#00FFB2", marginLeft:"16px" }}>{interviewFeedback.rating}</div>
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    );
  }

  function renderVoice() {
    return (
      <div style={S.content}>
        <div style={S.sectionTitle}>Voice Training Lab</div>
        <div style={S.sectionSub}>Build confidence, clarity and professional speech patterns</div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"20px" }}>
          <div>
            <div style={{ ...S.glowCard, textAlign:"center", marginBottom:"16px" }}>
              <div style={{ width:"80px", height:"80px", borderRadius:"50%", background: micActive?"rgba(0,255,178,0.15)":"rgba(255,255,255,0.04)", border: micActive?"2px solid #00FFB2":"2px solid rgba(255,255,255,0.1)", display:"flex", alignItems:"center", justifyContent:"center", margin:"0 auto 16px", cursor:"pointer", transition:"all 0.3s", fontSize:"28px" }} onClick={() => setMicActive(!micActive)}>🎙</div>
              <div style={{ marginBottom:"12px", display:"flex", justifyContent:"center" }}><MicWave active={micActive} /></div>
              <div style={{ fontSize:"13px", color: micActive?"#00FFB2":"rgba(255,255,255,0.4)" }}>{micActive?"Recording... click to stop":"Click mic to simulate recording"}</div>
            </div>
            <div style={S.card}>
              <div style={{ fontSize:"13px", fontWeight:"600", marginBottom:"12px", color:"rgba(255,255,255,0.6)", textTransform:"uppercase", letterSpacing:"0.06em" }}>Practice Topics</div>
              {["Introduce yourself in 60 seconds","Explain your biggest professional achievement","Describe how you handle workplace pressure","Pitch your value proposition to an executive"].map((p,i) => (
                <div key={i} style={{ padding:"10px 12px", background:"rgba(255,255,255,0.025)", borderRadius:"8px", marginBottom:"6px", fontSize:"13px", cursor:"pointer", transition:"background 0.2s" }}
                  onMouseEnter={(e) => e.currentTarget.style.background="rgba(0,255,178,0.06)"}
                  onMouseLeave={(e) => e.currentTarget.style.background="rgba(255,255,255,0.025)"}>{p}</div>
              ))}
            </div>
          </div>
          <div>
            <div style={{ ...S.card, marginBottom:"16px" }}>
              <div style={{ fontSize:"13px", fontWeight:"600", marginBottom:"12px", color:"rgba(255,255,255,0.6)", textTransform:"uppercase", letterSpacing:"0.06em" }}>Transcribe Your Response</div>
              <textarea style={{ ...S.input, minHeight:"120px", marginBottom:"12px" }} placeholder="Type or paste what you said..." value={voiceText} onChange={(e) => setVoiceText(e.target.value)} />
              <button style={{ ...S.btn, ...S.btnPrimary, opacity:voiceLoading?0.6:1, width:"100%" }} onClick={analyzeVoice} disabled={voiceLoading}>
                {voiceLoading ? "Analyzing speech..." : "Analyze Communication →"}
              </button>
            </div>
            {voiceFeedback && !voiceFeedback.error && (
              <div style={S.card}>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"10px", marginBottom:"14px" }}>
                  <div style={{ textAlign:"center" }}>
                    <div style={{ fontSize:"28px", fontWeight:"800", color:"#00FFB2" }}>{voiceFeedback.confidence_score}</div>
                    <div style={{ fontSize:"11px", color:"rgba(255,255,255,0.4)", textTransform:"uppercase" }}>Confidence</div>
                  </div>
                  <div style={{ textAlign:"center" }}>
                    <div style={{ fontSize:"28px", fontWeight:"800", color:"#7B61FF" }}>{voiceFeedback.clarity}</div>
                    <div style={{ fontSize:"11px", color:"rgba(255,255,255,0.4)", textTransform:"uppercase" }}>Clarity</div>
                  </div>
                </div>
                <div style={{ display:"flex", gap:"8px", flexWrap:"wrap", marginBottom:"10px" }}>
                  {voiceFeedback.filler_words?.map((w,i) => <span key={i} style={S.badge("#FF6B6B")}>{w}</span>)}
                  {voiceFeedback.filler_words?.length > 0 && <span style={{ fontSize:"12px", color:"rgba(255,255,255,0.3)" }}>filler words detected</span>}
                </div>
                <div style={{ fontSize:"13px", color:"rgba(255,255,255,0.5)", marginBottom:"10px" }}>
                  <span style={{ color:"#FFD93D", fontWeight:"600" }}>Pace:</span> {voiceFeedback.pace} &nbsp;|&nbsp;
                  <span style={{ color:"#4ECDC4", fontWeight:"600" }}>Tone:</span> {voiceFeedback.tone}
                </div>
                <div style={{ fontSize:"12px", color:"rgba(255,255,255,0.4)", marginBottom:"8px", textTransform:"uppercase", letterSpacing:"0.06em" }}>Coaching Tips</div>
                {voiceFeedback.suggestions?.map((s,i) => <div key={i} style={{ fontSize:"13px", color:"rgba(255,255,255,0.65)", marginBottom:"4px" }}>→ {s}</div>)}
                <div style={{ marginTop:"12px", padding:"12px", background:"rgba(0,255,178,0.06)", borderRadius:"8px", fontSize:"13px", color:"rgba(255,255,255,0.7)", fontStyle:"italic", borderLeft:"2px solid #00FFB2" }}>{voiceFeedback.overall_delivery}</div>
              </div>
            )}
          </div>
        </div>
      </div>
    );
  }

  function renderWriting() {
    return (
      <div style={S.content}>
        <div style={S.sectionTitle}>Written Response Evaluation</div>
        <div style={S.sectionSub}>Sharpen executive communication and analytical writing</div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"20px" }}>
          <div>
            <div style={{ ...S.card, marginBottom:"16px" }}>
              <div style={{ fontSize:"13px", fontWeight:"600", marginBottom:"12px", color:"rgba(255,255,255,0.6)", textTransform:"uppercase", letterSpacing:"0.06em" }}>Select Prompt</div>
              {WRITING_PROMPTS.map((p,i) => (
                <div key={i} style={{ padding:"12px", borderRadius:"8px", marginBottom:"6px", cursor:"pointer", fontSize:"13px", background: selectedPrompt===i?"rgba(0,255,178,0.08)":"rgba(255,255,255,0.025)", border: selectedPrompt===i?"1px solid rgba(0,255,178,0.2)":"1px solid transparent", transition:"all 0.2s" }} onClick={() => { setSelectedPrompt(i); setWritingFeedback(null); }}>{p}</div>
              ))}
            </div>
            <div style={S.card}>
              <div style={{ fontSize:"13px", fontWeight:"600", marginBottom:"12px", color:"rgba(255,255,255,0.6)", textTransform:"uppercase", letterSpacing:"0.06em" }}>Your Response</div>
              <textarea style={{ ...S.input, minHeight:"140px", marginBottom:"12px" }} placeholder={`Respond to: "${WRITING_PROMPTS[selectedPrompt]}"`} value={writingInput} onChange={(e) => setWritingInput(e.target.value)} />
              <button style={{ ...S.btn, ...S.btnPrimary, opacity:writingLoading?0.6:1, width:"100%" }} onClick={analyzeWriting} disabled={writingLoading}>
                {writingLoading ? "Analyzing writing..." : "Evaluate Response →"}
              </button>
            </div>
          </div>
          <div>
            {!writingFeedback && (
              <div style={{ ...S.card, height:"100%", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:"12px", minHeight:"300px" }}>
                <div style={{ fontSize:"36px" }}>▣</div>
                <div style={{ fontSize:"14px", color:"rgba(255,255,255,0.4)" }}>Select a prompt and write your response</div>
                <div style={{ fontSize:"12px", color:"rgba(255,255,255,0.25)" }}>AI will evaluate logic, tone, clarity and structure</div>
              </div>
            )}
            {writingFeedback && !writingFeedback.error && (
              <div style={{ display:"flex", flexDirection:"column", gap:"12px" }}>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"10px" }}>
                  {[{ label:"Clarity", val:writingFeedback.clarity, color:"#00FFB2" },{ label:"Logic", val:writingFeedback.logic, color:"#7B61FF" },{ label:"Tone", val:writingFeedback.professional_tone, color:"#FFD93D" },{ label:"Conciseness", val:writingFeedback.conciseness, color:"#4ECDC4" }].map((m,i) => (
                    <div key={i} style={{ ...S.card, padding:"16px" }}>
                      <div style={{ fontSize:"26px", fontWeight:"800", color:m.color }}>{m.val}</div>
                      <div style={{ ...S.progressBar(m.val,m.color), margin:"6px 0" }}><div style={S.progressFill(m.val,m.color)} /></div>
                      <div style={{ fontSize:"11px", color:"rgba(255,255,255,0.4)", textTransform:"uppercase", letterSpacing:"0.06em" }}>{m.label}</div>
                    </div>
                  ))}
                </div>
                <div style={{ ...S.glowCard, padding:"16px", textAlign:"center" }}>
                  <div style={{ fontSize:"36px", fontWeight:"900", color:"#00FFB2" }}>{writingFeedback.overall}</div>
                  <div style={{ fontSize:"12px", color:"rgba(255,255,255,0.4)", textTransform:"uppercase" }}>Overall Score</div>
                </div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"10px" }}>
                  <div style={{ ...S.card, padding:"14px" }}>
                    <div style={{ fontSize:"11px", color:"#00FFB2", marginBottom:"8px", fontWeight:"600", textTransform:"uppercase" }}>Strengths</div>
                    {writingFeedback.strengths?.map((s,i) => <div key={i} style={{ fontSize:"12px", color:"rgba(255,255,255,0.65)", marginBottom:"3px" }}>• {s}</div>)}
                  </div>
                  <div style={{ ...S.card, padding:"14px" }}>
                    <div style={{ fontSize:"11px", color:"#FFD93D", marginBottom:"8px", fontWeight:"600", textTransform:"uppercase" }}>Improve</div>
                    {writingFeedback.improvements?.map((s,i) => <div key={i} style={{ fontSize:"12px", color:"rgba(255,255,255,0.65)", marginBottom:"3px" }}>• {s}</div>)}
                  </div>
                </div>
                <div style={{ ...S.card, padding:"14px", fontSize:"13px", color:"rgba(255,255,255,0.65)", fontStyle:"italic", borderLeft:"2px solid #7B61FF" }}>{writingFeedback.summary}</div>
              </div>
            )}
          </div>
        </div>
      </div>
    );
  }

  function renderRoadmap() {
    const phases = [
      { period:"30 Days", subtitle:"Foundation Sprint", color:"#00FFB2", goals:["Establish daily 15-min practice habit","Complete 4 behavioral interview simulations","Score 75%+ on communication clarity","Eliminate top 3 filler words"], skills:["Communication","Confidence"], outcome:"Visible improvement in verbal and written expression" },
      { period:"90 Days", subtitle:"Growth Phase", color:"#7B61FF", goals:["Master STAR method for all scenarios","Reach 70%+ across all 5 skill areas","Complete corporate + customer service sims","Build personal leadership narrative"], skills:["Leadership","Analytics","Adaptability"], outcome:"Solid professional presence across all contexts" },
      { period:"6–12 Months", subtitle:"Transformation", color:"#FFD93D", goals:["Achieve 85%+ overall power skills score","Build signature communication style","Lead a real-world presentation or project","Mentor a junior colleague"], skills:["All 5 Skills","Executive Presence"], outcome:"Deep professional transformation and competitive positioning" },
    ];
    return (
      <div style={S.content}>
        <div style={S.sectionTitle}>Personalized Roadmap</div>
        <div style={S.sectionSub}>A realistic, structured path to professional transformation</div>
        <div style={{ display:"flex", flexDirection:"column", gap:"16px", marginBottom:"32px" }}>
          {phases.map((p,i) => (
            <div key={i} style={{ ...S.card, borderLeft:`3px solid ${p.color}`, borderRadius:"12px" }}>
              <div style={{ display:"grid", gridTemplateColumns:"200px 1fr", gap:"24px" }}>
                <div>
                  <div style={{ fontSize:"28px", fontWeight:"800", color:p.color, letterSpacing:"-0.03em" }}>{p.period}</div>
                  <div style={{ fontSize:"13px", color:"rgba(255,255,255,0.5)", marginBottom:"12px" }}>{p.subtitle}</div>
                  <div style={{ display:"flex", flexWrap:"wrap", gap:"6px" }}>
                    {p.skills.map((s,j) => <span key={j} style={S.badge(p.color)}>{s}</span>)}
                  </div>
                </div>
                <div>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"6px", marginBottom:"12px" }}>
                    {p.goals.map((g,j) => <div key={j} style={{ display:"flex", gap:"8px", fontSize:"13px", color:"rgba(255,255,255,0.65)" }}><span style={{ color:p.color, flexShrink:0 }}>→</span> {g}</div>)}
                  </div>
                  <div style={{ padding:"10px 14px", background:`${p.color}10`, borderRadius:"8px", fontSize:"13px", color:"rgba(255,255,255,0.7)", fontWeight:"500" }}>🎯 {p.outcome}</div>
                </div>
              </div>
            </div>
          ))}
        </div>
        <div style={S.card}>
          <div style={{ fontSize:"14px", fontWeight:"600", marginBottom:"16px" }}>Career Evolution Trajectory</div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:"12px" }}>
            {[{ level:"Current", role:"Individual Contributor", skills:"Basic Communication", color:"#888" },{ level:"Month 3", role:"High-Potential Profile", skills:"Strong Presence", color:"#4ECDC4" },{ level:"Month 6", role:"Team Leader Ready", skills:"Executive Communication", color:"#7B61FF" },{ level:"Year 1", role:"Senior Professional", skills:"Full Power Skills Suite", color:"#00FFB2" }].map((c,i) => (
              <div key={i} style={{ ...S.card, padding:"16px", borderColor:`${c.color}30`, textAlign:"center" }}>
                <div style={{ fontSize:"11px", color:c.color, textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:"8px", fontWeight:"600" }}>{c.level}</div>
                <div style={{ fontSize:"13px", fontWeight:"700", marginBottom:"4px" }}>{c.role}</div>
                <div style={{ fontSize:"11px", color:"rgba(255,255,255,0.4)" }}>{c.skills}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  }

  const pageMap = { home:renderHome, dashboard:renderDashboard, simulator:renderSimulator, voice:renderVoice, writing:renderWriting, roadmap:renderRoadmap };

  return (
    <div style={S.app}>
      <div style={S.bg} />
      <div style={S.grid} />
      <div style={S.sidebar}>
        <div style={S.logo}>
          {sidebarOpen ? (
            <div>
              <div style={S.logoText}>PowerSkills</div>
              <div style={{ fontSize:"10px", color:"rgba(255,255,255,0.2)", marginTop:"2px", letterSpacing:"0.06em" }}>AI TRAINER v2</div>
            </div>
          ) : (
            <div style={{ fontSize:"16px", color:"#00FFB2", textAlign:"center" }}>PS</div>
          )}
        </div>
        {NAV_ITEMS.map((item) => (
          <div key={item.id} style={S.navItem(activePage===item.id)} onClick={() => setActivePage(item.id)}>
            <span style={S.navIcon(activePage===item.id)}>{item.icon}</span>
            <span style={S.navLabel(activePage===item.id)}>{item.label}</span>
          </div>
        ))}
        <div style={{ marginTop:"auto", padding:"0 20px" }}>
          <div style={{ padding:"10px 0", cursor:"pointer", display:"flex", alignItems:"center", gap:"8px" }} onClick={() => setSidebarOpen(!sidebarOpen)}>
            <span style={{ fontSize:"12px", color:"rgba(255,255,255,0.3)" }}>{sidebarOpen?"←":"→"}</span>
            {sidebarOpen && <span style={{ fontSize:"12px", color:"rgba(255,255,255,0.3)" }}>Collapse</span>}
          </div>
          {psUser && (
            <div style={{ padding:"10px 0", fontSize:"12px", color:"rgba(255,255,255,0.3)", borderTop:"1px solid rgba(255,255,255,0.06)", marginTop:"8px" }}>
              {sidebarOpen && <span>👤 {psUser.nombre || psUser.email}</span>}
            </div>
          )}
        </div>
      </div>
      <div style={S.main}>
        <div style={S.topbar}>
          <div style={{ fontSize:"13px", color:"rgba(255,255,255,0.4)" }}>{NAV_ITEMS.find((n) => n.id===activePage)?.label}</div>
          <div style={{ display:"flex", alignItems:"center", gap:"16px" }}>
            <div style={{ fontSize:"12px", color:"rgba(255,255,255,0.25)", fontFamily:"monospace" }}>{formatTime(sessionTime)}</div>
            <div style={S.badge("#00FFB2")}>Overall: {overallScore}%</div>
            <div style={{ width:"32px", height:"32px", borderRadius:"50%", background:"rgba(0,255,178,0.1)", border:"1px solid rgba(0,255,178,0.2)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:"12px", fontWeight:"700", color:"#00FFB2" }}>
              {psUser?.nombre?.[0]?.toUpperCase() || "U"}
            </div>
          </div>
        </div>
        {(pageMap[activePage] || renderHome)()}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
